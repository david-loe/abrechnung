services:
  backend:
    image: davidloe/abrechnung-backend:2
    restart: unless-stopped
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - ${BACKEND_PORT}:8000
    env_file:
      - .env

  frontend:
    image: davidloe/abrechnung-frontend:2
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - ${FRONTEND_PORT}:8080
    env_file:
      - .env
  
  worker:
    image: davidloe/abrechnung-backend:2
    command: npm run worker
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"import('ioredis').then(async ({ default: Redis }) => { const redis = new Redis(process.env.REDIS_URL); try { const pong = await redis.ping(); await redis.quit(); process.exit(pong === 'PONG' ? 0 : 1); } catch { try { redis.disconnect(); } catch {} process.exit(1); } }).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - .env

  db:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - db_data:/data/db
    tmpfs:
      - /data/configdb

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
